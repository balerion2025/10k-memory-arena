<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>10K Lucky Spin</title><style>body{margin:0;background:#09030f;color:white;font-family:Arial}.app{width:min(900px,96vw);margin:auto;padding:20px}h1{text-align:center;font-size:72px;color:#ff66df;text-shadow:0 0 30px #a855f7;margin:0}h2{text-align:center}.game{border:1px solid #ffffff30;border-radius:24px;background:#160824;padding:18px;box-shadow:0 0 30px #0008}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.cell{aspect-ratio:1;border-radius:16px;background:#8b38ff;overflow:hidden;border:2px solid #ffffff30}.cell img{width:100%;height:100%;object-fit:cover}.win{border-color:#ffd873;box-shadow:0 0 22px #ffd873}.msg{text-align:center;color:#fff0a6;font-weight:900;min-height:28px}.stats{text-align:center;margin:15px}button{background:#ffffff20;color:white;border:1px solid #ffffff40;border-radius:12px;padding:12px;font-weight:900;cursor:pointer}#spin{width:140px;height:140px;border-radius:50%;font-size:34px;background:radial-gradient(circle,#ff77e8,#842dff)}ol{color:#ddd}footer{text-align:center;color:#aaa;margin-top:20px}</style></head><body><main class=app><h1>10K</h1><h2>Lucky Spin</h2><section class=game><div id=msg class=msg>Loading images...</div><div id=grid class=grid></div><div class=stats>Credits: <b id=c>10000</b> | Bet: <b id=b>100</b> | Win: <b id=w>0</b></div><center><button id=minus>-</button> <button id=spin>SPIN</button> <button id=plus>+</button> <button id=reset>RESET</button></center><h3>Local leaderboard</h3><ol id=lb></ol><button id=clear>CLEAR LOCAL</button></section><footer>For community fun only. No real money, no betting, no payouts.</footer></main><script>let IMG=[],g=[],wins=[],credits=+(localStorage.c||10000),score=+(localStorage.s||0),bet=+(localStorage.b||100),win=0;const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];async function load(){let names=['yellow','blue','pink'];for(let n of names){let x=await fetch('assets/'+n+'.b64').then(r=>r.text());IMG.push({id:n,src:'data:image/jpeg;base64,'+x})}msg.textContent='Ready. Hit spin.';roll();board()}function r(){return IMG[Math.floor(Math.random()*IMG.length)]}function draw(){grid.innerHTML='';g.forEach((x,i)=>{let d=document.createElement('div');d.className='cell '+(wins.flat().includes(i)?'win':'');d.innerHTML='<img src="'+x.src+'">';grid.appendChild(d)});c.textContent=credits;b.textContent=bet;w.textContent=win;localStorage.c=credits;localStorage.s=score;localStorage.b=bet}function roll(){g=Array.from({length:9},r);draw()}async function spinIt(){if(credits<bet){msg.textContent='Not enough credits';return}credits-=bet;win=0;wins=[];let t=0,int=setInterval(()=>{roll();if(++t>12){clearInterval(int);finish()}},90)}function finish(){roll();let m=0;wins=[];for(const l of lines)if(g[l[0]].id==g[l[1]].id&&g[l[1]].id==g[l[2]].id){wins.push(l);m+=8}win=bet*m;if(win){credits+=win;score+=win;msg.textContent='WIN +'+win;save()}else msg.textContent='No line. Spin again.';draw();board()}function save(){let a=JSON.parse(localStorage.lb||'[]');a.push({name:'player',score,credits});a.sort((x,y)=>y.score-x.score);localStorage.lb=JSON.stringify(a.slice(0,10))}function board(){let a=JSON.parse(localStorage.lb||'[]');lb.innerHTML=a.length?'':'<li>No wins yet.</li>';a.forEach(x=>{let li=document.createElement('li');li.textContent=x.name+' · '+x.score+' pts · '+x.credits+' credits';lb.appendChild(li)})}spin.onclick=spinIt;minus.onclick=()=>{bet=Math.max(50,bet-50);draw()};plus.onclick=()=>{bet+=50;draw()};reset.onclick=()=>{credits=10000;score=0;win=0;draw()};clear.onclick=()=>{localStorage.removeItem('lb');board()};load();</script></body></html>
